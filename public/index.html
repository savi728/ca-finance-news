<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🍁 加拿大财经快讯 · Canada Finance News</title>
<style>
  :root { /* 夜间(默认) */
    --bg:#0d1117; --card:#161b22; --line:#21262d; --fg:#e6edf3; --dim:#8b949e; --accent:#d63b3b; --hover:#1c2230; --bar:rgba(13,17,23,.92); --chip:#161b22; --scroll:#30363d;
  }
  body.light {
    --bg:#f6f7f9; --card:#ffffff; --line:#e4e7eb; --fg:#1a1d21; --dim:#6b7280; --accent:#c0392b; --hover:#f0f2f5; --bar:rgba(246,247,249,.94); --chip:#ffffff; --scroll:#cbd2d9;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif; transition:background .2s,color .2s; }
  header { position:sticky; top:0; background:var(--bar); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); z-index:20; }
  .top { max-width:1500px; margin:0 auto; padding:12px 16px; display:flex; align-items:center; gap:8px; }
  .top h1 { font-size:17px; white-space:nowrap; }
  .top h1 small { display:block; font-size:10px; color:var(--dim); font-weight:400; }
  .top .meta { color:var(--dim); font-size:11px; margin-left:auto; white-space:nowrap; }
  .top button { background:transparent; border:1px solid var(--line); color:var(--dim); border-radius:8px; padding:6px 10px; cursor:pointer; font-size:12px; white-space:nowrap; }
  .top button:hover { color:var(--fg); border-color:var(--accent); }
  /* 板块导航(横滑) */
  nav { max-width:1500px; margin:0 auto; padding:0 10px 10px; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  nav::-webkit-scrollbar { display:none; }
  nav a { white-space:nowrap; padding:5px 11px; border-radius:999px; border:1px solid var(--line); background:var(--chip); color:var(--dim); font-size:12.5px; text-decoration:none; }
  nav a:hover { color:var(--fg); border-color:var(--accent); }
  main { max-width:1500px; margin:0 auto; padding:14px 16px 60px;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:14px; align-items:start; }
  .col { background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; scroll-margin-top:120px; }
  .col h2 { font-size:14px; padding:11px 14px; border-bottom:1px solid var(--line); background:var(--card); display:flex; align-items:center; gap:7px; }
  .col h2 .n { margin-left:auto; color:var(--dim); font-weight:400; font-size:12px; }
  .col .body { max-height:560px; overflow-y:auto; }
  .item { display:block; text-decoration:none; color:inherit; padding:9px 14px; border-bottom:1px solid var(--line); }
  .item:last-child { border-bottom:none; }
  .item:hover { background:var(--hover); }
  .item .zh { font-size:13.5px; line-height:1.45; font-weight:600; }
  .item .t { font-size:12px; line-height:1.4; color:var(--dim); margin-top:2px; }
  /* 仅英文模式:英文标题变主标题样式 */
  body.lang-en .item .zh { display:none; }
  body.lang-en .item .t { font-size:13.5px; font-weight:600; color:var(--fg); margin-top:0; }
  /* 仅中文模式:隐藏英文(无译文时回退显示英文) */
  body.lang-zh .item .t { display:none; }
  body.lang-zh .item .zh:empty::after { content:attr(data-en); font-weight:600; }
  .item .f { display:flex; gap:8px; margin-top:4px; font-size:11px; color:var(--dim); }
  .item .src { color:var(--accent); }
  .col .empty { padding:18px 14px; color:var(--dim); font-size:12px; }
  .loading { grid-column:1/-1; text-align:center; color:var(--dim); padding:60px 0; }
  .body::-webkit-scrollbar { width:6px; } .body::-webkit-scrollbar-thumb { background:var(--scroll); border-radius:3px; }
  @media (max-width:560px){ .top h1 { font-size:15px; } .top .meta { display:none; } }
</style>
</head>
<body>
<header>
  <div class="top">
    <h1>🍁 加拿大财经快讯<small>Canada Finance News</small></h1>
    <span class="meta" id="meta"></span>
    <button id="lang" title="Language 语言">🌐 EN+中</button>
    <button id="theme" title="Light / Dark 日夜模式">🌙</button>
    <button id="refresh" title="Refresh 刷新">↻</button>
  </div>
  <nav id="nav"></nav>
</header>
<main id="board"><div class="loading">加载中…</div></main>
<script>
// 板块英文名(按 key 映射,仅英文模式用)
const EN = { macro:'Macro · Rates', energy:'Energy · Oil & Gas', banks:'Banks · Finance', mining:'Mining · Materials', tech:'Tech', realty:'Real Estate', cannabis:'Cannabis', crypto:'Crypto' };
const board = document.getElementById('board'), nav = document.getElementById('nav'), meta = document.getElementById('meta');
let data = null;
const LANGS = ['both','en','zh'], LANG_LABEL = { both:'EN+中', en:'English', zh:'中文' };

// ---- 偏好(记住选择) ----
let lang = localStorage.getItem('cfn-lang') || 'both';
let theme = localStorage.getItem('cfn-theme') || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
function applyPrefs(){
  document.body.classList.toggle('light', theme==='light');
  document.body.classList.remove('lang-en','lang-zh');
  if(lang==='en') document.body.classList.add('lang-en');
  if(lang==='zh') document.body.classList.add('lang-zh');
  document.getElementById('theme').textContent = theme==='light' ? '☀️' : '🌙';
  document.getElementById('lang').textContent = '🌐 ' + LANG_LABEL[lang];
}

function ago(ts){ if(!ts) return ''; const s=(Date.now()-ts)/1000;
  if(s<60) return lang==='en'?'now':'刚刚';
  if(s<3600) return Math.floor(s/60)+(lang==='en'?'m':'分钟前');
  if(s<86400) return Math.floor(s/3600)+(lang==='en'?'h':'小时前');
  return Math.floor(s/86400)+(lang==='en'?'d':'天前'); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  if(!data) return;
  meta.textContent = (lang==='en'?'updated ':'更新于 ')+new Date(data.updated).toLocaleTimeString(lang==='en'?'en-CA':'zh-CN',{hour:'2-digit',minute:'2-digit'});
  nav.innerHTML = data.board.map(c => `<a href="#sec-${c.key}">${c.emoji} ${lang==='en'?(EN[c.key]||c.label):c.label}</a>`).join('');
  board.innerHTML = data.board.map(c => {
    const name = lang==='en' ? (EN[c.key]||c.label) : c.label;
    const empty = lang==='en' ? 'No headlines yet' : '暂无快讯';
    return `<section class="col" id="sec-${c.key}">
      <h2>${c.emoji} ${name}<span class="n">${c.items.length}</span></h2>
      <div class="body">${ c.items.length ? c.items.map(i => `<a class="item" href="${esc(i.link)}" target="_blank" rel="noopener">
        <div class="zh" data-en="${esc(i.title)}">${esc(i.zh)}</div>
        <div class="t">${esc(i.title)}</div>
        <div class="f"><span class="src">${esc(i.source)}</span><span>${ago(i.ts)}</span></div></a>`).join('')
        : `<div class="empty">${empty}</div>` }</div>
    </section>`;
  }).join('');
}

async function load(){
  try {
    data = await (await fetch('/api/board')).json();
    render();
  } catch(e){ board.innerHTML = '<div class="loading">加载失败,确认服务在运行 / failed to load</div>'; }
}

document.getElementById('theme').onclick = () => { theme = theme==='light'?'dark':'light'; localStorage.setItem('cfn-theme',theme); applyPrefs(); };
document.getElementById('lang').onclick = () => { lang = LANGS[(LANGS.indexOf(lang)+1)%LANGS.length]; localStorage.setItem('cfn-lang',lang); applyPrefs(); render(); };
document.getElementById('refresh').onclick = load;

applyPrefs();
load();
setInterval(load, 10*60*1000);
</script>
</body>
</html>
