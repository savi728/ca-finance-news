<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🍁 加拿大财经快讯</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --line:#21262d; --fg:#e6edf3; --dim:#8b949e; --accent:#d63b3b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif; }
  header { position:sticky; top:0; background:rgba(13,17,23,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); z-index:10; }
  .top { max-width:1500px; margin:0 auto; padding:14px 20px; display:flex; align-items:baseline; gap:10px; }
  .top h1 { font-size:18px; }
  .top .meta { color:var(--dim); font-size:12px; margin-left:auto; }
  .top button { background:transparent; border:1px solid var(--line); color:var(--dim); border-radius:7px; padding:5px 12px; cursor:pointer; font-size:12px; }
  .top button:hover { color:var(--fg); border-color:var(--accent); }
  main { max-width:1500px; margin:0 auto; padding:16px 20px 60px;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:14px; align-items:start; }
  .col { background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .col h2 { font-size:14px; padding:11px 14px; border-bottom:1px solid var(--line); position:sticky; top:0;
    background:var(--card); display:flex; align-items:center; gap:7px; }
  .col h2 .n { margin-left:auto; color:var(--dim); font-weight:400; font-size:12px; }
  .col .body { max-height:560px; overflow-y:auto; }
  .item { display:block; text-decoration:none; color:inherit; padding:9px 14px; border-bottom:1px solid var(--line); }
  .item:last-child { border-bottom:none; }
  .item:hover { background:#1c2230; }
  .item .zh { font-size:13.5px; line-height:1.45; font-weight:600; }
  .item .t { font-size:12px; line-height:1.4; color:var(--dim); margin-top:2px; }
  .item .f { display:flex; gap:8px; margin-top:4px; font-size:11px; color:var(--dim); }
  .item .src { color:var(--accent); }
  .col .empty { padding:18px 14px; color:var(--dim); font-size:12px; }
  .loading { grid-column:1/-1; text-align:center; color:var(--dim); padding:60px 0; }
  /* 细滚动条 */
  .body::-webkit-scrollbar { width:6px; } .body::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }
</style>
</head>
<body>
<header>
  <div class="top">
    <h1>🍁 加拿大财经快讯</h1>
    <span class="meta" id="meta"></span>
    <button id="refresh">↻ 刷新</button>
  </div>
</header>
<main id="board"><div class="loading">加载中…</div></main>
<script>
const board = document.getElementById('board'), meta = document.getElementById('meta');
function ago(ts){ if(!ts) return ''; const s=(Date.now()-ts)/1000;
  if(s<60) return '刚刚'; if(s<3600) return Math.floor(s/60)+'分钟前';
  if(s<86400) return Math.floor(s/3600)+'小时前'; return Math.floor(s/86400)+'天前'; }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function load(){
  try {
    const d = await (await fetch('/api/board')).json();
    meta.textContent = '更新于 '+new Date(d.updated).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    board.innerHTML = d.board.map(c => `<section class="col">
      <h2>${c.emoji} ${c.label}<span class="n">${c.items.length}</span></h2>
      <div class="body">${ c.items.length ? c.items.map(i => `<a class="item" href="${i.link}" target="_blank" rel="noopener">
        ${i.zh?`<div class="zh">${esc(i.zh)}</div>`:''}
        <div class="t">${esc(i.title)}</div>
        <div class="f"><span class="src">${esc(i.source)}</span><span>${ago(i.ts)}</span></div></a>`).join('')
        : '<div class="empty">暂无快讯</div>' }</div>
    </section>`).join('');
  } catch(e){ board.innerHTML = '<div class="loading">加载失败,确认 server.js 在运行</div>'; }
}
document.getElementById('refresh').onclick = load;
load();
setInterval(load, 10*60*1000); // 每 10 分钟自动刷新
</script>
</body>
</html>
